<!-- ===============================================

     WERSJA 1.0
     =============================================== -->

<div style="padding: 20px; font-family: Arial, sans-serif;">
    <h2>📊 Finance Menu</h2>
    <p>Centralny panel modułów finansowych CityOfGATE.</p>

    <div style="
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 20px;
    ">

        <!-- Budget Bank -->
        <div class="finance-tile" onclick="loadModule('finance/budget-bank')">
            <h3>💰 Budget Bank</h3>
            <p>Zarządzanie budżetem i transakcjami.</p>
        </div>

        <!-- Treasure Vault -->
        <div class="finance-tile" onclick="loadModule('finance/treasure-vault')">
            <h3>🏺 Treasure Vault</h3>
            <p>Składnica zasobów i wartości.</p>
        </div>

        <!-- Grants Office -->
        <div class="finance-tile" onclick="loadModule('finance/grants-office')">
            <h3>📑 Grants Office</h3>
            <p>Obsługa grantów i wniosków.</p>
        </div>

        <!-- Placeholder for future modules -->
        <div class="finance-tile" style="opacity: 0.4;">
            <h3>📈 Finance Reports</h3>
            <p>(w przygotowaniu)</p>
        </div>

    </div>
</div>

<style>
.finance-tile {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid #ddd;
}
.finance-tile:hover {
    background: #e8e8e8;
    transform: translateY(-3px);
}
.finance-tile h3 {
    margin-top: 0;
}
</style>
