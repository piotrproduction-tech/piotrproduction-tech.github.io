<!-- ===============================================
     CityOfGATE — DIAGNOSTICS PANEL (HTML)
     WERSJA 1.0
     =============================================== -->

<div style="padding: 20px; font-family: Arial, sans-serif;">
    <h2>Panel Diagnostyczny — CityOfGATE</h2>
    <p>Podgląd logów systemowych generowanych przez loader i moduły.</p>

    <button id="refreshLogsBtn" style="margin-right: 10px;">Odśwież logi</button>
    <button id="clearLogsBtn" style="background-color: #c62828; color: white;">Wyczyść logi</button>

    <hr style="margin: 20px 0;">

    <table id="diagnosticsTable" border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse;">
        <thead style="background-color: #f0f0f0;">
            <tr>
                <th style="width: 200px;">Czas</th>
                <th style="width: 120px;">Typ</th>
                <th>Wiadomość</th>
            </tr>
        </thead>
        <tbody>
            <!-- Logi zostaną wstawione dynamicznie -->
        </tbody>
    </table>
</div>
