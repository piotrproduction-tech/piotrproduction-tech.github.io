<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>CityOfGATE Console</title>

  <!-- Globalne style -->
  <link rel="stylesheet" href="shared/styles.css">
</head>

<body>

  <h1>CityOfGATE Console</h1>

  <!-- ============================
       KAFELKI / PRZYCISKI MODUŁÓW
       ============================ -->
  <div class="tiles">

    <!-- Budget Bank -->
    <button 
      onclick="loadModule('finance/budget-bank')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #0066cc;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      💰 Bank Budżetowy
    </button>

    <!-- Treasure Vault -->
    <button 
      onclick="loadModule('finance/treasure-vault')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #009966;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      🏺 Treasure Vault
    </button>

    <!-- Panel diagnostyczny -->
    <button 
      onclick="loadModule('system/diagnostics')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #333;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      🔧 Panel diagnostyczny
    </button>

  </div>

  <!-- ============================
       KONTENER NA MODUŁY
       ============================ -->
  <div id="app"></div>

  <!-- ============================
       IMPORT LOADERA (ES MODULE)
       ============================ -->
  <script type="module">
      import { loadModule } from "./loader.js";
      window.loadModule = loadModule;
  </script>

  <!-- API (opcjonalne) -->
  <script src="shared/api.js"></script>

</body>
</html>
