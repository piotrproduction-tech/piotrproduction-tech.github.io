<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>CityOfGATE Console</title>

  <!-- Globalne style -->
  <link rel="stylesheet" href="shared/styles.css">
</head>

<body>

  <h1>CityOfGATE Console</h1>

  <!-- ============================
       KAFELKI / PRZYCISKI MODUŁÓW
       ============================ -->
  <div class="tiles">

    <!-- Finance Menu -->
    <button 
      onclick="loadModule('finance/finance-menu')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #cc0033;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      📊 Finance Menu
    </button>

    <!-- Budget Bank -->
    <button 
      onclick="loadModule('finance/budget-bank')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #0066cc;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      💰 Bank Budżetowy
    </button>

    <!-- Treasure Vault -->
    <button 
      onclick="loadModule('finance/treasure-vault')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #009966;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      🏺 Treasure Vault
    </button>

    <!-- Grants Office -->
    <button 
      onclick="loadModule('finance/grants-office')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #cc6600;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      📑 Grants Office
    </button>

    <!-- Admin Tower -->
    <button 
      onclick="loadModule('admin/admin-tower')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #8844cc;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      🏛️ Admin Tower
    </button>

    <!-- System Logs Engine -->
    <button 
      onclick="loadModule('system/logs-engine')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #555;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      📜 System Logs Engine
    </button>
    <!-- Finance Reports -->
    <button 
      onclick="loadModule('finance/finance-reports')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #3366cc;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      📈 Finance Reports
    </button>
    <!-- Payments -->
    <button 
      onclick="loadModule('finance/payments')" 
      style="
        padding: 12px 20px;
        margin: 10px 0;
        background-color: #cc3366;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      💳 Payments
    </button>

  </div>

  <!-- ============================
       KONTENER NA MODUŁY
       ============================ -->
  <div id="app"></div>

  <!-- ============================
       CORE SILNIK LOGÓW (musi być pierwszy!)
       ============================ -->
  <script src="shared/logs-engine-core.js"></script>

  <!-- ============================
       LOADER MODUŁÓW (ES MODULE)
       ============================ -->
  <script type="module">
      import { loadModule } from "./loader.js";
      window.loadModule = loadModule;
  </script>

  <!-- API (opcjonalne) -->
  <script src="shared/api.js"></script>

</body>
</html>
